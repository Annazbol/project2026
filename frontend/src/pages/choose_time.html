<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выбор времени бронирования</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .loading-state {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-theme-hint-color, #e0e0e0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: #e34d4d;
        }

        .time-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .time-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .time-slot {
            flex: 1;
            min-width: 100px;
            padding: 14px 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-text-color, #000000);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .time-slot.selected {
            background-color: var(--tg-theme-button-color, #2481cc);
            border-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .time-slot.unavailable {
            opacity: 0.5;
            text-decoration: line-through;
            cursor: not-allowed;
        }

        .info-message {
            background-color: rgba(36, 129, 204, 0.1);
            border-left: 4px solid var(--tg-theme-button-color, #2481cc);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .warning-message {
            background-color: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #ffc107;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .btn-primary {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-back {
            background-color: transparent;
            color: var(--tg-theme-link-color, #2481cc);
            margin-top: 16px;
        }

        .no-slots {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Выбор времени</h1>
            <p class="subtitle">Выберите удобное время для бронирования</p>
        </div>

        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Загрузка доступных слотов времени...</p>
        </div>

        <div id="errorState" class="error-state" style="display: none;">
            <p>⚠️ Не удалось загрузить доступные слоты времени</p>
            <button id="retryBtn" class="btn" style="background-color: var(--tg-theme-secondary-bg-color); margin-top: 12px;">Повторить</button>
        </div>

        <div id="formState" style="display: none;">
            <div id="infoMessage" class="info-message" style="display: none;">
                <p>💡 <span id="infoMessageText"></span></p>
            </div>

            <div class="time-section">
                <div class="section-title">Доступные слоты времени</div>
                <div id="timeSlotsGrid" class="time-grid"></div>
            </div>

            <div id="warningMessage" class="warning-message" style="display: none;">
                <p>⚠️ <span id="warningText"></span></p>
            </div>

            <button id="submitBtn" class="btn btn-primary" disabled>Выбрать время</button>
        </div>

        <button id="backBtn" class="btn btn-back">← Назад</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const formState = document.getElementById('formState');
        const timeSlotsGrid = document.getElementById('timeSlotsGrid');
        const infoMessage = document.getElementById('infoMessage');
        const infoMessageText = document.getElementById('infoMessageText');
        const warningMessage = document.getElementById('warningMessage');
        const warningText = document.getElementById('warningText');
        const submitBtn = document.getElementById('submitBtn');
        const backBtn = document.getElementById('backBtn');
        const retryBtn = document.getElementById('retryBtn');

        let selectedTimeSlot = null;
        let availableTimeSlots = [];

        async function fetchAvailableTimeSlots() {
            try {
                loadingState.style.display = 'block';
                errorState.style.display = 'none';
                formState.style.display = 'none';
                
                const response = await fetch('/api/available-time-slots', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData
                    },
                    body: JSON.stringify({})
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                if (data.success) {
                    availableTimeSlots = data.time_slots || [
                        { time: "09:00", start: "09:00", end: "10:00", is_available: true },
                        { time: "10:00", start: "10:00", end: "11:00", is_available: true },
                        { time: "11:00", start: "11:00", end: "12:00", is_available: true },
                        { time: "12:00", start: "12:00", end: "13:00", is_available: true },
                        { time: "13:00", start: "13:00", end: "14:00", is_available: true },
                        { time: "14:00", start: "14:00", end: "15:00", is_available: true },
                        { time: "15:00", start: "15:00", end: "16:00", is_available: true },
                        { time: "16:00", start: "16:00", end: "17:00", is_available: true },
                        { time: "17:00", start: "17:00", end: "18:00", is_available: true },
                        { time: "18:00", start: "18:00", end: "19:00", is_available: true },
                        { time: "19:00", start: "19:00", end: "20:00", is_available: true },
                        { time: "20:00", start: "20:00", end: "21:00", is_available: true }
                    ];
                    
                    if (data.info_message) {
                        infoMessageText.textContent = data.info_message;
                        infoMessage.style.display = 'block';
                    }
                    
                    if (data.warning) {
                        warningText.textContent = data.warning;
                        warningMessage.style.display = 'block';
                    }
                    
                    renderTimeSlots(availableTimeSlots);
                    return true;
                } else {
                    throw new Error(data.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                return false;
            }
        }

        function renderTimeSlots(slots) {
            loadingState.style.display = 'none';
            formState.style.display = 'block';
            
            if (!slots || slots.length === 0) {
                timeSlotsGrid.innerHTML = '<div class="no-slots">Нет доступных слотов времени</div>';
                submitBtn.disabled = true;
                return;
            }
            
            timeSlotsGrid.innerHTML = '';
            
            slots.forEach(slot => {
                const button = document.createElement('button');
                button.className = 'time-slot';
                button.textContent = slot.time;
                button.dataset.time = slot.time;
                button.dataset.start = slot.start;
                button.dataset.end = slot.end;
                
                if (slot.is_available === false) {
                    button.classList.add('unavailable');
                    button.disabled = true;
                } else {
                    button.addEventListener('click', () => {
                        document.querySelectorAll('.time-slot').forEach(btn => {
                            if (!btn.disabled) btn.classList.remove('selected');
                        });
                        button.classList.add('selected');
                        selectedTimeSlot = {
                            time: slot.time,
                            start: slot.start,
                            end: slot.end
                        };
                        submitBtn.disabled = false;
                    });
                }
                
                timeSlotsGrid.appendChild(button);
            });
        }

        function submitSelection() {
            if (!selectedTimeSlot) {
                tg.showAlert('Пожалуйста, выберите время бронирования');
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'select_time_slot',
                time_start: selectedTimeSlot.start,
                time_end: selectedTimeSlot.end
            }));
            
            tg.close();
        }

        function goBack() {
            tg.sendData(JSON.stringify({
                action: 'back',
                step: 'time_selection'
            }));
            tg.close();
        }

        async function init() {
            tg.setHeaderColor('bg_color');
            tg.BackButton.show();
            tg.BackButton.onClick(() => goBack());
            
            await fetchAvailableTimeSlots();
            
            submitBtn.addEventListener('click', submitSelection);
            backBtn.addEventListener('click', goBack);
            if (retryBtn) retryBtn.addEventListener('click', () => fetchAvailableTimeSlots());
        }
        
        init();
    </script>
</body>
</html>
