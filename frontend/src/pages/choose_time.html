<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выбор времени бронирования</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .booking-info {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 500;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .info-value {
            font-weight: 600;
        }

        .loading-state {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-theme-hint-color, #e0e0e0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: #e34d4d;
        }

        .time-section {
            margin-bottom: 24px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 16px;
        }

        .hint {
            font-size: 12px;
            font-weight: normal;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .time-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .time-slot {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-text-color, #000000);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .time-slot.selected {
            background-color: var(--tg-theme-button-color, #2481cc);
            border-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .time-slot.unavailable {
            opacity: 0.5;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            text-decoration: line-through;
            cursor: not-allowed;
        }

        .time-slot.unavailable:hover {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }

        .time-slot.recommended {
            border: 1px solid #ffc107;
            position: relative;
        }

        .time-slot.recommended::after {
            content: "★";
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #ffc107;
            color: #000;
            font-size: 12px;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-message {
            background-color: rgba(36, 129, 204, 0.1);
            border-left: 4px solid var(--tg-theme-button-color, #2481cc);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .warning-message {
            background-color: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #ffc107;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .btn-primary {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            margin-top: 12px;
        }

        .btn-back {
            background-color: transparent;
            color: var(--tg-theme-link-color, #2481cc);
            margin-top: 16px;
        }

        .no-slots {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .quick-select {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .quick-btn {
            flex: 1;
            padding: 10px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: var(--tg-theme-text-color, #000000);
        }

        .duration-selector {
            margin-bottom: 24px;
        }

        .duration-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .duration-options {
            display: flex;
            gap: 12px;
        }

        .duration-btn {
            flex: 1;
            padding: 10px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: var(--tg-theme-text-color, #000000);
        }

        .duration-btn.selected {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Выбор времени</h1>
            <p class="subtitle">Выберите удобное время для бронирования</p>
        </div>

        <div class="booking-info">
            <div class="info-row">
                <span class="info-label">Дата:</span>
                <span class="info-value" id="selectedDate">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Корпус:</span>
                <span class="info-value" id="selectedBuilding">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Количество человек:</span>
                <span class="info-value" id="selectedPeople">—</span>
            </div>
        </div>

        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Загрузка доступных слотов времени...</p>
        </div>

        <div id="errorState" class="error-state" style="display: none;">
            <p>⚠️ Не удалось загрузить доступные слоты времени</p>
            <button id="retryBtn" class="btn" style="background-color: var(--tg-theme-secondary-bg-color); margin-top: 12px;">Повторить</button>
        </div>

        <div id="formState" style="display: none;">
            <div id="infoMessage" class="info-message" style="display: none;">
                <p>💡 <span id="infoMessageText"></span></p>
            </div>

            <div class="quick-select">
                <button id="morningBtn" class="quick-btn">🌅 Утро (9-12)</button>
                <button id="afternoonBtn" class="quick-btn">☀️ День (12-17)</button>
                <button id="eveningBtn" class="quick-btn">🌙 Вечер (17-21)</button>
            </div>

            <div class="duration-selector">
                <div class="duration-title">Продолжительность бронирования:</div>
                <div class="duration-options">
                    <button data-duration="30" class="duration-btn">30 мин</button>
                    <button data-duration="60" class="duration-btn selected">1 час</button>
                    <button data-duration="90" class="duration-btn">1.5 часа</button>
                    <button data-duration="120" class="duration-btn">2 часа</button>
                    <button data-duration="180" class="duration-btn">3 часа</button>
                </div>
            </div>

            <div class="time-section">
                <div class="section-title">
                    <span>Доступные слоты времени</span>
                    <span class="hint" id="slotCount">—</span>
                </div>
                
                <div id="timeSlotsGrid" class="time-grid"></div>
            </div>

            <div id="warningMessage" class="warning-message" style="display: none;">
                <p>⚠️ <span id="warningText"></span></p>
            </div>

            <button id="submitBtn" class="btn btn-primary" disabled>Выбрать время</button>
        </div>

        <button id="backBtn" class="btn btn-back">← Назад</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const formState = document.getElementById('formState');
        const timeSlotsGrid = document.getElementById('timeSlotsGrid');
        const infoMessage = document.getElementById('infoMessage');
        const infoMessageText = document.getElementById('infoMessageText');
        const warningMessage = document.getElementById('warningMessage');
        const warningText = document.getElementById('warningText');
        const submitBtn = document.getElementById('submitBtn');
        const backBtn = document.getElementById('backBtn');
        const retryBtn = document.getElementById('retryBtn');
        const slotCountSpan = document.getElementById('slotCount');

        const morningBtn = document.getElementById('morningBtn');
        const afternoonBtn = document.getElementById('afternoonBtn');
        const eveningBtn = document.getElementById('eveningBtn');
        const durationBtns = document.querySelectorAll('.duration-btn');

        let selectedTimeSlot = null;
        let selectedDuration = 60;
        let availableTimeSlots = [];
        let originalTimeSlots = [];

        let bookingContext = {
            date: null,
            buildingId: null,
            buildingName: null,
            peopleCount: null
        };

        function getBookingContext() {
            const urlParams = new URLSearchParams(window.location.search);
            
            bookingContext = {
                date: urlParams.get('date') || localStorage.getItem('booking_date'),
                buildingId: urlParams.get('building_id') || localStorage.getItem('building_id'),
                buildingName: urlParams.get('building_name') || localStorage.getItem('building_name'),
                peopleCount: urlParams.get('people_count') || localStorage.getItem('booking_people_count')
            };
            
            document.getElementById('selectedDate').textContent = bookingContext.date || 'Не выбрано';
            document.getElementById('selectedBuilding').textContent = bookingContext.buildingName || 'Не выбран';
            document.getElementById('selectedPeople').textContent = bookingContext.peopleCount ? `${bookingContext.peopleCount} чел.` : 'Не выбрано';
            
            return bookingContext.date && bookingContext.buildingId;
        }

        async function fetchAvailableTimeSlots() {
            try {
                loadingState.style.display = 'block';
                errorState.style.display = 'none';
                formState.style.display = 'none';
                
                const response = await fetch('/api/available-time-slots', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData
                    },
                    body: JSON.stringify({
                        date: bookingContext.date,
                        building_id: bookingContext.buildingId,
                        people_count: bookingContext.peopleCount,
                        duration: selectedDuration
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                if (data.success) {
                    originalTimeSlots = data.time_slots || [];
                    availableTimeSlots = [...originalTimeSlots];
                    
                    if (data.info_message) {
                        infoMessageText.textContent = data.info_message;
                        infoMessage.style.display = 'block';
                    } else {
                        infoMessage.style.display = 'none';
                    }
                    
                    if (data.warning) {
                        warningText.textContent = data.warning;
                        warningMessage.style.display = 'block';
                    } else {
                        warningMessage.style.display = 'none';
                    }
                    
                    renderTimeSlots(availableTimeSlots);
                    updateSlotCount();
                    return true;
                } else {
                    throw new Error(data.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                return false;
            }
        }

        function renderTimeSlots(slots) {
            loadingState.style.display = 'none';
            formState.style.display = 'block';
            
            if (!slots || slots.length === 0) {
                timeSlotsGrid.innerHTML = '<div class="no-slots">На выбранную дату нет доступных слотов времени</div>';
                submitBtn.disabled = true;
                return;
            }
            
            timeSlotsGrid.innerHTML = '';
            
            slots.forEach(slot => {
                const button = document.createElement('button');
                button.className = 'time-slot';
                button.textContent = slot.time;
                button.dataset.time = slot.time;
                button.dataset.start = slot.start;
                button.dataset.end = slot.end;
                
                if (slot.is_recommended) {
                    button.classList.add('recommended');
                }
                
                if (slot.is_available === false) {
                    button.classList.add('unavailable');
                    button.disabled = true;
                } else {
                    button.addEventListener('click', () => {
                        document.querySelectorAll('.time-slot').forEach(btn => {
                            if (!btn.disabled) btn.classList.remove('selected');
                        });
                        button.classList.add('selected');
                        selectedTimeSlot = {
                            time: slot.time,
                            start: slot.start,
                            end: slot.end
                        };
                        submitBtn.disabled = false;
                    });
                }
                
                timeSlotsGrid.appendChild(button);
            });
        }

        function updateSlotCount() {
            const availableCount = availableTimeSlots.filter(slot => slot.is_available !== false).length;
            slotCountSpan.textContent = `доступно: ${availableCount}`;
        }

        function filterByTimeOfDay(startHour, endHour) {
            const filtered = originalTimeSlots.filter(slot => {
                const hour = parseInt(slot.start.split(':')[0]);
                return hour >= startHour && hour < endHour;
            });
            
            availableTimeSlots = filtered;
            renderTimeSlots(availableTimeSlots);
            updateSlotCount();
            selectedTimeSlot = null;
            submitBtn.disabled = true;
            
            document.querySelectorAll('.quick-btn').forEach(btn => btn.style.opacity = '0.7');
            if (startHour === 9) morningBtn.style.opacity = '1';
            else if (startHour === 12) afternoonBtn.style.opacity = '1';
            else if (startHour === 17) eveningBtn.style.opacity = '1';
        }

        function resetFilter() {
            availableTimeSlots = [...originalTimeSlots];
            renderTimeSlots(availableTimeSlots);
            updateSlotCount();
            selectedTimeSlot = null;
            submitBtn.disabled = true;
            document.querySelectorAll('.quick-btn').forEach(btn => btn.style.opacity = '1');
        }

        async function updateTimeSlotsForDuration(duration) {
            selectedDuration = duration;
            
            try {
                loadingState.style.display = 'block';
                formState.style.display = 'none';
                
                const response = await fetch('/api/available-time-slots', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData
                    },
                    body: JSON.stringify({
                        date: bookingContext.date,
                        building_id: bookingContext.buildingId,
                        people_count: bookingContext.peopleCount,
                        duration: selectedDuration
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                if (data.success) {
                    originalTimeSlots = data.time_slots || [];
                    availableTimeSlots = [...originalTimeSlots];
                    renderTimeSlots(availableTimeSlots);
                    updateSlotCount();
                    selectedTimeSlot = null;
                    submitBtn.disabled = true;
                } else {
                    throw new Error(data.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
            }
        }

        function submitSelection() {
            if (!selectedTimeSlot) {
                tg.showAlert('Пожалуйста, выберите время бронирования');
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'select_time_slot',
                time_start: selectedTimeSlot.start,
                time_end: selectedTimeSlot.end,
                duration: selectedDuration,
                date: bookingContext.date,
                building_id: bookingContext.buildingId,
                people_count: bookingContext.peopleCount
            }));
            
            tg.close();
        }

        function goBack() {
            tg.sendData(JSON.stringify({
                action: 'back',
                step: 'time_selection'
            }));
            tg.close();
        }

        async function init() {
            tg.setHeaderColor('bg_color');
            tg.BackButton.show();
            tg.BackButton.onClick(() => goBack());
            
            if (!getBookingContext()) {
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                errorState.querySelector('p').textContent = '❌ Отсутствуют данные для бронирования';
                return;
            }
            
            durationBtns.forEach(btn => {
                btn.addEventListener('click', async () => {
                    durationBtns.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    const duration = parseInt(btn.dataset.duration);
                    await updateTimeSlotsForDuration(duration);
                });
            });
            
            morningBtn.addEventListener('click', () => filterByTimeOfDay(9, 12));
            afternoonBtn.addEventListener('click', () => filterByTimeOfDay(12, 17));
            eveningBtn.addEventListener('click', () => filterByTimeOfDay(17, 21));
            
            await fetchAvailableTimeSlots();
            
            submitBtn.addEventListener('click', submitSelection);
            backBtn.addEventListener('click', goBack);
            if (retryBtn) retryBtn.addEventListener('click', () => fetchAvailableTimeSlots());
        }
        
        init();
    </script>
</body>
</html>
